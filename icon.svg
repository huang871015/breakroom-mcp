  <path d="M84 42c4-6 10-16 0-20" fill="none" stroke="url(#steam)" stroke-width="3" stroke-linecap="round"/>
  <!-- 八卦眼睛 -->
  <circle cx="52" cy="68" r="4" fill="#1e293b"/>
  <circle cx="76" cy="68" r="4" fill="#1e293b"/>
  <circle cx="52" cy="68" r="1.5" fill="#fff"/>
